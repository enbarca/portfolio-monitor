select:focus,textarea:focus,input:focus{outline:none;border-color:var(--accent)}
.sb{display:inline-block;padding:2px 8px;font-size:9px;font-weight:700;letter-spacing:1.5px}
.tr{background:var(--bg3);border-left:3px solid var(--amber);padding:10px 14px;margin:4px 0;font-size:11px}
.tr.milestone{border-left-color:var(--blue)}.tr.metric{border-left-color:var(--red)}.tr.qualitative{border-left-color:var(--dim)}
.ml{font-size:8px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.mt{font-size:22px;font-weight:700;line-height:1}
.flag{font-size:8px;color:var(--red);border:1px solid var(--red);padding:0 5px;letter-spacing:.5px;display:inline-block;margin-left:4px}
table{width:100%;border-collapse:collapse;font-size:10px}
th{text-align:right;padding:5px 6px;font-size:8px;letter-spacing:1px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border)}
th:first-child,th:nth-child(2){text-align:left}
td{padding:4px 6px;border-bottom:1px solid var(--border);text-align:right}
td:first-child{text-align:left;font-weight:600}td:nth-child(2){text-align:left}
.warn{padding:10px 14px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);margin-bottom:12px;font-size:11px}
.info{padding:8px 14px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);margin-bottom:12px;font-size:10px;color:var(--amber);display:flex;align-items:center;gap:6px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:10px}
.detail-grid span:nth-child(odd){color:var(--dim)}
.metrics-row{display:grid;grid-template-columns:repeat(7,1fr);gap:0 10px;min-width:420px}
.metrics-row .val{font-size:13px;font-weight:700}
#app{min-height:100vh}
.hidden{display:none}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .2s ease-out}
</style>

function load(){try{state.fd=JSON.parse(localStorage.getItem("ptm_fd")||"{}");state.peg=JSON.parse(localStorage.getItem("ptm_peg")||"{}");state.gn=JSON.parse(localStorage.getItem("ptm_gn")||"{}");state.journal=JSON.parse(localStorage.getItem("ptm_je")||"[]");state.alloc=JSON.parse(localStorage.getItem("ptm_alloc")||"{}")}catch(e){}}

// Parsers
function parseFin(text){
  const lines=text.trim().split("\n");if(lines.length<2)return{};
  const h=lines[0].split("\t").map(s=>s.trim());const d={};
  for(let i=1;i<lines.length;i++){
    const c=lines[i].split("\t").map(s=>s.trim());const tk=c[0];if(!tk)continue;
    const r={};h.forEach((hh,j)=>{r[hh]=c[j]||""});
    const p=k=>{const v=parseFloat(r[k]);return isNaN(v)?null:v};
    d[tk]={name:r.Name||tk,revenue:p("Total Revenues (FQ)"),revenueGrowth:p("Total Revenues/CAGR (1Y TTM)"),cash:p("Cash/ST Investments (FQ)"),totalDebt:p("Total Debt (LTM)"),grossMargin:p("Gross Profit Margin % (FQ)"),sgaMargin:p("SG&A Margin (FQ)"),psLTM:p("P/S (LTM)"),psNTM:p("P/S (NTM)"),pfcfLTM:p("P/FCF (LTM)"),fcfLTM:p("FCF (LTM)"),deferredRevenue:p("Unearned Revenue Current/Total (LTM)")};
  }return d;
}

function parsePeg(text){
  const d={};text.trim().split("\n").forEach(l=>{
    const p=l.split(/[\t,]/);if(p.length>=3){const t=p[0].trim().toUpperCase();const peg=p[1].trim()==="#N/A"?null:parseFloat(p[1]);const ro=parseFloat(p[2].replace("%",""));if(t)d[t]={peg:isNaN(peg)?null:peg,ro40ext:isNaN(ro)?null:ro}}
  });return d;
}

// Metrics
function metrics(fd){
  if(!fd)return null;
  const gm=fd.grossMargin!=null?fd.grossMargin*100:null;
  const gr=fd.revenueGrowth!=null?fd.revenueGrowth*100:null;
  const sga=fd.sgaMargin!=null?fd.sgaMargin*100:null;
  const op=gm!=null&&sga!=null?gm-sga:null;
  const ro40=gr!=null&&op!=null?gr+op:null;
  const fcfm=fd.fcfLTM!=null&&fd.revenue>0?(fd.fcfLTM/(fd.revenue*4))*100:null;
  const fcfro=gr!=null&&fcfm!=null?gr+fcfm:null;
  const nc=fd.cash!=null&&fd.totalDebt!=null?fd.cash-fd.totalDebt:null;
  const dtr=fd.totalDebt!=null&&fd.revenue>0?fd.totalDebt/(fd.revenue*4):null;
  const dp=fd.deferredRevenue!=null&&fd.revenue>0?(fd.deferredRevenue/(fd.revenue*4))*100:null;
  // Net margin = operating margin proxy (GM - SGA) — imperfect but consistent across portfolio
  const netMargin=op!=null?op/100:null;
  // P/E proxy = P/S ÷ net margin (only meaningful when margin > 0)
  const peProxy=fd.psLTM!=null&&netMargin!=null&&netMargin>0?fd.psLTM/netMargin:null;
  // PEG = P/E ÷ growth rate (only meaningful when growth > 0)
  const peg=peProxy!=null&&gr!=null&&gr>0?peProxy/gr:null;
  // FCF-PEG = P/FCF ÷ growth rate (often more useful for tech)
  const fcfPeg=fd.pfcfLTM!=null&&fd.pfcfLTM>0&&gr!=null&&gr>0?fd.pfcfLTM/gr:null;
  return{gm,growth:gr,sga,opMargin:op,ro40,fcfMargin:fcfm,fcfRo40:fcfro,netCash:nc,debtToRev:dtr,deferredPct:dp,psLTM:fd.psLTM,psNTM:fd.psNTM,pfcf:fd.pfcfLTM,revenue:fd.revenue,name:fd.name,peg,fcfPeg,peProxy};
}

// Signal
function signal(pos,m,curAlloc){
  if(!m)return{signal:"NO DATA",color:"#64748b",score:0,reasons:["Upload financial data via Data tab"],flags:[]};
  const R=[];const F=[];let s=0;
  if(m.growth!=null){if(m.growth>30){s+=2;R.push(`Growth ${m.growth.toFixed(0)}% — strong`)}else if(m.growth>15){s+=1;R.push(`Growth ${m.growth.toFixed(0)}% — healthy`)}else if(m.growth>5){R.push(`Growth ${m.growth.toFixed(0)}% — moderate`)}else if(m.growth<=0){s-=2;F.push("DECLINING REV");R.push(`Growth ${m.growth.toFixed(0)}% — contracting`)}else{s-=1;R.push(`Growth ${m.growth.toFixed(0)}% — slow`)}}
  if(m.gm!=null){if(m.gm>75){s+=1;R.push(`GM ${m.gm.toFixed(0)}% — premium`)}else if(m.gm>60){R.push(`GM ${m.gm.toFixed(0)}% — healthy`)}else if(m.gm<40){s-=1;R.push(`GM ${m.gm.toFixed(0)}% — thin`)}}
  if(m.ro40!=null){if(m.ro40>80){s+=2;R.push(`RO40 ${m.ro40.toFixed(0)}% — elite`)}else if(m.ro40>40){s+=1;R.push(`RO40 ${m.ro40.toFixed(0)}% — passing`)}else if(m.ro40>20){R.push(`RO40 ${m.ro40.toFixed(0)}% — below threshold`)}else{s-=1;F.push("RO40 FAIL");R.push(`RO40 ${m.ro40.toFixed(0)}% — failing`)}}
  if(m.pfcf!=null){if(m.pfcf>0&&m.pfcf<15){s+=2;R.push(`P/FCF ${m.pfcf.toFixed(1)} — very attractive`)}else if(m.pfcf>0&&m.pfcf<30){s+=1;R.push(`P/FCF ${m.pfcf.toFixed(1)} — reasonable`)}else if(m.pfcf>60){s-=1;R.push(`P/FCF ${m.pfcf.toFixed(1)} — expensive`)}}
  if(m.fcfMargin!=null&&m.fcfMargin<0){s-=1;F.push("FCF NEG");R.push(`FCF margin ${m.fcfMargin.toFixed(0)}% — burning`)}
  // PEG valuation (using operating P/E proxy)
  if(m.peg!=null){if(m.peg<0.5){s+=2;R.push(`PEG ${m.peg.toFixed(2)} — deeply undervalued`)}else if(m.peg<1.0){s+=1;R.push(`PEG ${m.peg.toFixed(2)} — undervalued`)}else if(m.peg<2.0){R.push(`PEG ${m.peg.toFixed(2)} — fairly valued`)}else{s-=1;R.push(`PEG ${m.peg.toFixed(2)} — overvalued`)}}
  // FCF-PEG (often more useful for growth companies)
  if(m.fcfPeg!=null){if(m.fcfPeg<1.0){R.push(`FCF-PEG ${m.fcfPeg.toFixed(2)} — attractive on cash flow basis`)}else if(m.fcfPeg>3.0){R.push(`FCF-PEG ${m.fcfPeg.toFixed(2)} — expensive on cash flow basis`)}}
  if(m.netCash!=null){if(m.netCash>0)R.push(`Net cash $${(m.netCash/1000).toFixed(1)}B`);else if(m.debtToRev>3){s-=1;F.push("LEVERAGE");R.push(`Debt/Rev ${m.debtToRev.toFixed(1)}x`)}}
  if(m.deferredPct!=null&&m.deferredPct>30){s+=1;R.push(`Deferred rev ${m.deferredPct.toFixed(0)}% — backlog`)}
  if(pos.moats.length>=3&&s>=2){s+=1;R.push(`Multi-moat (${pos.moats.length}) at discount`)}
  if(pos.fl&&s>=1){s+=1;R.push(`Founder-led: ${pos.founder}`)}
  if(pos.vb){F.push("VENTURE BET");R.push("⚠ Thesis-dependent — guardrails apply")}
  // Allocation gap
  if(curAlloc!=null){
    const gap=pos.target-curAlloc;
    if(gap>1.5){s+=1;F.push("UNDERWEIGHT");R.push(`Current ${curAlloc.toFixed(1)}% vs target ${pos.target}% — significantly underweight (+${gap.toFixed(1)}% to buy)`)}
    else if(gap>0.5){R.push(`Underweight: current ${curAlloc.toFixed(1)}% vs target ${pos.target}% (+${gap.toFixed(1)}%)`)}
    else if(gap<-1.5){s-=1;F.push("OVERWEIGHT");R.push(`Current ${curAlloc.toFixed(1)}% vs target ${pos.target}% — significantly overweight (${gap.toFixed(1)}% to trim)`)}
    else if(gap<-0.5){R.push(`Overweight: current ${curAlloc.toFixed(1)}% vs target ${pos.target}% (${gap.toFixed(1)}%)`)}
    else{R.push(`On target: current ${curAlloc.toFixed(1)}% vs target ${pos.target}%`)}
  }
  let sig,col;
  if(s>=5){sig="STRONG BUY";col="#22c55e"}else if(s>=3){sig="BUY";col="#4ade80"}else if(s>=1){sig="ACCUMULATE";col="#a3e635"}else if(s>=-1){sig="HOLD";col="#f59e0b"}else if(s>=-3){sig="TRIM";col="#fb923c"}else{sig="SELL";col="#ef4444"}
  return{signal:sig,color:col,score:s,reasons:R,flags:F};
}

function mc(v,th){if(v==null)return"var(--dim)";for(const[t,c]of th)if(v>=t)return c;return"var(--red)"}
function fmt(v,suf="",d=0){return v!=null?v.toFixed(d)+suf:"—"}
function fmtB(v){return v!=null?"$"+(v/1000).toFixed(1)+"B":"—"}
function h(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// Render
function render(){
  const fd=state.fd;const enriched=POSITIONS.map(p=>{const m=metrics(fd[p.t]);const curAlloc=state.alloc[p.t]!=null?state.alloc[p.t]:null;const sig=signal(p,m,curAlloc);const pg=state.peg[p.t];return{...p,m,...sig,curAlloc,peg:pg?.peg,pegRo40:pg?.ro40ext}});

  // Health
  let tRo=0,cRo=0,bRo=0,tGr=0,cGr=0,fcfN=0;
  enriched.forEach(p=>{if(p.m?.ro40!=null){tRo+=p.m.ro40;cRo++;if(p.m.ro40<70)bRo++}if(p.m?.growth!=null){tGr+=p.m.growth;cGr++}if(p.m?.fcfMargin!=null&&p.m.fcfMargin<0)fcfN++});
  const avgRo=cRo?tRo/cRo:null;const avgGr=cGr?tGr/cGr:null;const bRoPct=cRo?(bRo/cRo)*100:null;

  const alerts=enriched.filter(p=>p.signal==="STRONG BUY"||p.signal==="SELL"||p.signal==="TRIM"||p.flags.length>0).sort((a,b)=>(b.score||0)-(a.score||0));

  // Filter & sort
  let items=enriched;
  if(state.fTier!=="all")items=items.filter(p=>p.tier===parseInt(state.fTier));
  if(state.fRole!=="all")items=items.filter(p=>p.role===state.fRole);
  const sorts={signal:(a,b)=>(b.score||0)-(a.score||0),growth:(a,b)=>((b.m?.growth||-99)-(a.m?.growth||-99)),ro40:(a,b)=>((b.m?.ro40||-99)-(a.m?.ro40||-99)),peg:(a,b)=>((a.m?.peg||99)-(b.m?.peg||99)),pfcf:(a,b)=>((a.m?.pfcf||999)-(b.m?.pfcf||999)),target:(a,b)=>b.target-a.target,margin:(a,b)=>((b.m?.gm||0)-(a.m?.gm||0)),gap:(a,b)=>{const ga=a.curAlloc!=null?a.target-a.curAlloc:0;const gb=b.curAlloc!=null?b.target-b.curAlloc:0;return gb-ga}};
  items=[...items].sort(sorts[state.sort]||sorts.signal);
  const hasData=Object.keys(fd).length>0;
  const totalTarget=POSITIONS.reduce((s,p)=>s+p.target,0);

  let html=`<div style="border-bottom:1px solid var(--border);padding:14px 18px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">

    items.forEach(p=>{

        ${exp?`<div class="fi" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">

                <span>Revenue (FQ)</span><span>${m?.revenue?fmtB(m.revenue):"—"}</span>
                <span>Op Margin</span><span>${fmt(m?.opMargin,"%",1)}</span>
                <span>FCF Margin</span><span style="color:${m?.fcfMargin!=null&&m.fcfMargin<0?"var(--red)":"var(--text)"}">${fmt(m?.fcfMargin,"%",1)}</span>
                <span>FCF RO40</span><span>${fmt(m?.fcfRo40,"%")}</span>
                <span>Net Cash</span><span style="color:${m?.netCash!=null&&m.netCash<0?"var(--red)":"var(--text)"}">${m?.netCash!=null?fmtB(m.netCash):"—"}</span>
                <span>Deferred Rev %</span><span>${fmt(m?.deferredPct,"%",1)}</span>
                <span>SG&A</span><span>${fmt(m?.sga,"%",1)}</span>
                <span>PEG (calc)</span><span style="color:${m?.peg!=null?(m.peg<1?"var(--green)":m.peg<2?"var(--amber)":"var(--red)"):"var(--dim)"}">${m?.peg!=null?m.peg.toFixed(2):"—"}</span>
                <span>FCF-PEG</span><span style="color:${m?.fcfPeg!=null?(m.fcfPeg<1?"var(--green)":m.fcfPeg<2?"var(--amber)":"var(--red)"):"var(--dim)"}">${m?.fcfPeg!=null?m.fcfPeg.toFixed(2):"—"}</span>
                <span>P/E (proxy)</span><span>${m?.peProxy!=null?m.peProxy.toFixed(1)+"x":"—"}</span>              </div>

            </div>

        </div>`:""}

    });
    html+=`</div>`;
  }

  // ALERTS
  else if(state.view==="alerts"){
    html+=`<div class="fi"><div style="font-size:10px;color:var(--dim);margin-bottom:14px">Positions with strong signals, flags, or requiring action</div>`;
    if(!alerts.length)html+=`<div style="color:var(--green);padding:20px;text-align:center">No active alerts.</div>`;
    alerts.forEach(p=>{
      html+=`<div class="cd" style="border-left:3px solid ${p.color};cursor:default">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:700">${p.t}</span>
          <span class="sb" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}44">${p.signal}</span>
          ${p.flags.map(f=>`<span class="flag">${f}</span>`).join("")}
          <span style="font-size:9px;color:var(--dim)">${h(p.cat)} · T${p.tier} · ${p.target}%</span>
        </div>
        <div style="margin-top:6px">${p.reasons.slice(0,4).map(r=>`<div style="font-size:10px;padding:1px 0">→ ${h(r)}</div>`).join("")}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  // GUARDRAILS
  else if(state.view==="guardrails"){
    html+=`<div class="fi"><div style="font-size:10px;color:var(--dim);margin-bottom:14px">Pre-committed triggers. Set by clear-thinking-you.</div>`;
    if(bRoPct!=null&&bRoPct>33)html+=`<div class="warn"><span style="color:var(--red);font-weight:700">⚠ GUARDRAIL TRIGGERED:</span> ${bRo} positions (${bRoPct.toFixed(0)}%) below 70% RO40 — exceeds 33% threshold.</div>`;
    Object.entries(GUARDRAILS).forEach(([k,g])=>{
      html+=`<div style="margin-bottom:20px"><div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px">${g.title}</div>`;
      g.triggers.forEach(tr=>{
        html+=`<div class="tr ${tr.type}">
          <div style="font-weight:600">${h(tr.label)}</div>
          <div style="color:var(--amber);margin-top:3px;font-size:10px">→ ${h(tr.action)}</div>
          ${tr.deadline?`<div style="color:var(--dim);font-size:9px;margin-top:1px">Deadline: ${tr.deadline}</div>`:""}
          <input type="text" placeholder="Status note..." value="${h(state.gn[tr.id]||"")}" onchange="saveNote('${tr.id}',this.value)" style="width:100%;margin-top:6px;font-size:9px">
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  }

  // JOURNAL
  else if(state.view==="journal"){
    html+=`<div class="fi"><div style="font-size:10px;color:var(--dim);margin-bottom:14px">Quarterly thesis journal. Confirming? Challenging? Surprising?</div>
      <textarea id="je" rows="5" style="width:100%;resize:vertical;font-size:11px;line-height:1.6" placeholder="3 consecutive entries with no challenges = not looking hard enough"></textarea>
      <button class="nb" style="margin-top:6px" onclick="addJournal()">Save Entry</button>
      <div style="margin-top:16px">`;
    state.journal.forEach((e,i)=>{
      html+=`<div class="cd" style="cursor:default">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:10px;font-weight:700;color:var(--accent)">${e.date}</span>
          <span style="font-size:8px;color:var(--dim)">${e.health?`RO40 ${e.health.avgRo40?.toFixed(0)||"?"}% · Growth ${e.health.avgGrowth?.toFixed(0)||"?"}% · ${e.health.alerts} alerts`:""}</span>
        </div>
        <div style="font-size:10px;line-height:1.6;white-space:pre-wrap">${h(e.text)}</div>
        <button style="margin-top:6px;font-size:8px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit" onclick="delJournal(${i})">DELETE</button>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // DATA
  else if(state.view==="data"){
    html+=`<div class="fi"><div style="font-size:10px;color:var(--dim);margin-bottom:14px">Upload financial data (TSV) or PEG/RO40 overlay. Data persists in browser localStorage.</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        <button class="nb" onclick="toggleFin()">Paste Financials (TSV)</button>
        <button class="nb" onclick="togglePeg()">Paste PEG/RO40</button>
        <button class="nb" onclick="toggleAlloc()">Paste Allocations</button>
        <button class="nb" onclick="document.getElementById('fileInput').click()">Upload TSV File</button>
        <button class="nb" onclick="clearData()">Clear All Data</button>
        <span style="font-size:9px;color:var(--dim);display:flex;align-items:center">${Object.keys(fd).length} tickers loaded</span>
      </div>
      ${state.showFin?`<div style="margin-bottom:14px">
        <div style="font-size:9px;color:var(--dim);margin-bottom:4px">Paste full TSV with header row from your screener</div>
        <textarea id="finInput" rows="8" style="width:100%;resize:vertical;font-size:10px" placeholder="Ticker&#9;Name&#9;Total Revenues (FQ)&#9;..."></textarea>
        <button class="nb" style="margin-top:4px" onclick="loadFin()">Parse & Load</button>
      </div>`:""}
      ${state.showPeg?`<div style="margin-bottom:14px">
        <div style="font-size:9px;color:var(--dim);margin-bottom:4px">Paste: TICKER  PEG  RO40%</div>
        <textarea id="pegInput" rows="6" style="width:100%;resize:vertical;font-size:10px" placeholder="NVDA&#9;0.23&#9;140%"></textarea>
        <button class="nb" style="margin-top:4px" onclick="loadPeg()">Parse & Load</button>
      </div>`:""}
      ${state.showAlloc?`<div style="margin-bottom:14px">
        <div style="font-size:9px;color:var(--dim);margin-bottom:4px">Paste: Alloc% &lt;tab&gt; Target% &lt;tab&gt; TICKER (your screener format) — or — TICKER &lt;tab&gt; Alloc%</div>

// Event handlers
function nav(v){state.view=v;render()}
function setSort(v){state.sort=v;render()}
function setFilter(k,v){state[k]=v;render()}
function toggle(t){state.expanded=state.expanded===t?null:t;render()}
function saveNote(id,v){state.gn[id]=v;save("gn",state.gn)}
function toggleFin(){state.showFin=!state.showFin;state.showPeg=false;state.showAlloc=false;render()}
function togglePeg(){state.showPeg=!state.showPeg;state.showFin=false;state.showAlloc=false;render()}
function toggleAlloc(){state.showAlloc=!state.showAlloc;state.showFin=false;state.showPeg=false;render()}
function loadFin(){const el=document.getElementById("finInput");if(el&&el.value.trim()){const d=parseFin(el.value);const count=Object.keys(d).length;state.fd={...state.fd,...d};save("fd",state.fd);state.showFin=false;render();alert("Loaded "+count+" tickers")}}
function loadPeg(){const el=document.getElementById("pegInput");if(el&&el.value.trim()){const d=parsePeg(el.value);const count=Object.keys(d).length;state.peg={...state.peg,...d};save("peg",state.peg);state.showPeg=false;render();alert("Loaded "+count+" PEG entries")}}
function loadAlloc(){const el=document.getElementById("allocInput");if(el&&el.value.trim()){const d={};const lines=el.value.trim().split("\n");lines.forEach(l=>{const p=l.split(/\t/);if(p.length>=3){
  // Format: Alloc% \t Target% \t TICKER
  const ticker=p[2].trim().toUpperCase().replace(/[^A-Z.]/g,"");
  const allocRaw=p[0].trim().replace("%","");
  const targetRaw=p[1].trim().replace("%","");
  const alloc=parseFloat(allocRaw);
  const target=parseFloat(targetRaw);
  if(ticker&&ticker.length>=1&&ticker.length<=6){
    if(!isNaN(alloc))d[ticker]={alloc};
    if(!isNaN(target))d[ticker]={...(d[ticker]||{}),target};
  }
}else if(p.length>=2){
  // Fallback: TICKER \t Alloc%
  const t=p[0].trim().toUpperCase().replace(/[^A-Z.]/g,"");
  const v=parseFloat(p[1].trim().replace("%",""));
  if(t&&t.length>=1&&t.length<=6&&!isNaN(v))d[t]={alloc:v};
}});const count=Object.keys(d).length;if(count>0){
  // Merge allocations
  const newAlloc={...state.alloc};
  const newTargets={};
  Object.entries(d).forEach(([k,v])=>{
    if(v.alloc!=null)newAlloc[k]=v.alloc;
    if(v.target!=null)newTargets[k]=v.target;
  });
  state.alloc=newAlloc;save("alloc",state.alloc);
  // Also store targets if provided
  if(Object.keys(newTargets).length>0){state.allocTargets=newTargets;save("allocTargets",newTargets)}
  state.showAlloc=false;render();alert("Loaded "+count+" allocations")}else{alert("Could not parse. Expected format:\\nAlloc%\\tTarget%\\tTICKER\\nor TICKER\\tAlloc%")}}}
function clearData(){if(confirm("Clear all financial data?")){state.fd={};state.peg={};state.alloc={};save("fd",{});save("peg",{});save("alloc",{});render()}}
function addJournal(){const el=document.getElementById("je");if(el&&el.value.trim()){const enriched=POSITIONS.map(p=>metrics(state.fd[p.t]));let tRo=0,cRo=0,tGr=0,cGr=0,al=0;enriched.forEach(m=>{if(m?.ro40!=null){tRo+=m.ro40;cRo++}if(m?.growth!=null){tGr+=m.growth;cGr++}});
  state.journal=[{date:new Date().toISOString().split("T")[0],text:el.value.trim(),health:{avgRo40:cRo?tRo/cRo:null,avgGrowth:cGr?tGr/cGr:null,alerts:al}},...state.journal];save("je",state.journal);render()}}
function delJournal(i){state.journal=state.journal.filter((_,j)=>j!==i);save("je",state.journal);render()}

// Init
load();
document.getElementById('fileInput').addEventListener('change', function(e){
  const f=e.target.files[0];
  if(!f)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    const d=parseFin(ev.target.result);
    const count=Object.keys(d).length;
    state.fd={...state.fd,...d};
    save("fd",state.fd);
    render();
    alert("Loaded "+count+" tickers from file");
  };
  reader.readAsText(f);
  // reset after read starts so same file can be re-uploaded
  setTimeout(()=>{e.target.value=''},100);
});
render();
</script>
